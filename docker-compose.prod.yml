x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-farmspot_production}
      POSTGRES_USER: ${POSTGRES_USER:-farmspot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *host-gateway
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PORT: 3000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-farmspot}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-farmspot_production}
      REDIS_URL: redis://redis:6379/0
      NEWS_TRANSLATOR_BASE_URL: ${NEWS_TRANSLATOR_BASE_URL:-http://host.docker.internal:19191}
      NEWS_GAME_ID_BASE_URL: ${NEWS_GAME_ID_BASE_URL:-http://host.docker.internal:19192}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/bash", "-lc", "./bin/rails db:prepare && ./bin/rails news:bootstrap_sites && bundle exec puma -C config/puma.rb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *host-gateway
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-farmspot}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-farmspot_production}
      REDIS_URL: redis://redis:6379/0
      NEWS_TRANSLATOR_BASE_URL: ${NEWS_TRANSLATOR_BASE_URL:-http://host.docker.internal:19191}
      NEWS_GAME_ID_BASE_URL: ${NEWS_GAME_ID_BASE_URL:-http://host.docker.internal:19192}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_APP_TITLE: Farmspot
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-127.0.0.1:8080}:80"

volumes:
  postgres_data:
  redis_data:
