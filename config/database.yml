# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV.fetch("PGHOST", Rails.application.credentials.dig(:postgres, :host) || "127.0.0.1") %>
  port: <%= ENV.fetch("PGPORT", Rails.application.credentials.dig(:postgres, :port) || 5432) %>
  username: <%= ENV.fetch("PGUSER", Rails.application.credentials.dig(:postgres, :username) || ENV.fetch("USER", "postgres")) %>
  password: <%= ENV["PGPASSWORD"] || Rails.application.credentials.dig(:postgres, :password) %>
  database: <%= ENV.fetch("PGDATABASE", Rails.application.credentials.dig(:postgres, :development_database) || "farmspot_development") %>

test:
  <<: *default
  host: <%= ENV.fetch("PGHOST", Rails.application.credentials.dig(:postgres, :host) || "127.0.0.1") %>
  port: <%= ENV.fetch("PGPORT", Rails.application.credentials.dig(:postgres, :port) || 5432) %>
  username: <%= ENV.fetch("PGUSER", Rails.application.credentials.dig(:postgres, :username) || ENV.fetch("USER", "postgres")) %>
  password: <%= ENV["PGPASSWORD"] || Rails.application.credentials.dig(:postgres, :password) %>
  database: <%= ENV.fetch("PGDATABASE", Rails.application.credentials.dig(:postgres, :test_database) || "farmspot_test") %>

production:
  primary: &primary_production
    <<: *default
    host: <%= ENV.fetch("PGHOST", Rails.application.credentials.dig(:postgres, :host) || "127.0.0.1") %>
    port: <%= ENV.fetch("PGPORT", Rails.application.credentials.dig(:postgres, :port) || 5432) %>
    database: <%= ENV.fetch("PGDATABASE", Rails.application.credentials.dig(:postgres, :production_database) || "farmspot_production") %>
    username: <%= ENV.fetch("PGUSER", Rails.application.credentials.dig(:postgres, :username) || "farmspot") %>
    password: <%= ENV["FARMSPOT_DATABASE_PASSWORD"] || ENV["PGPASSWORD"] || Rails.application.credentials.dig(:postgres, :password) %>
  cache:
    <<: *primary_production
    database: farmspot_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: farmspot_production_queue
    migrations_paths: db/queue_migrate
